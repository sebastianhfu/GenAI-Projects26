site_name: KI in Medienanwendungen — Projekte
site_url: https://sebastianhfu.github.io/GenAI-Projects26
site_author: Prof. Uwe Hahne
site_description: Praktische Projektarbeit im Kurs KI in Medienanwendungen im SoSe 2026

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep-orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: de

plugins:
  - search:
      lang: de

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/uhahne
  generator: false

copyright: Copyright &copy; 2026 Prof. Uwe Hahne

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Projekte:
    - Übersicht: projects/index.md
    - Projekt 1: projects/project01.md
    - Projekt 2: projects/project02.md
    - Projekt 3:
      - Übersicht: projects/project03/index.md
      - Log: projects/project03/log.md
      - Audio API: projects/project03/audio_api.md
      - Images: projects/project03/images.md
  - Dokumentation:
    - Übersicht: docs/index.md
    - Projekt 1: docs/project01.md
    - Projekt 2: docs/project02.md
    - Projekt 3: docs/project03.md
  - Ressourcen:
    - Übersicht: resources/index.md
    - Tools: resources/tools.md
    - KI-Modelle: resources/models.md
  - About: about.md
